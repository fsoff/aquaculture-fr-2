<script>
let active=null;
function open_modal(key){
  if(active===key){close_modal();return;}
  if(active){const p=document.getElementById('hs-'+active);if(p)p.classList.remove('active');}
  active=key;
  const hs=document.getElementById('hs-'+key);if(hs)hs.classList.add('active');
  const cfg=MODALS[key];if(!cfg)return;
  document.getElementById('m-title').textContent=cfg.title;
  document.getElementById('m-sub').textContent=cfg.sub;
  document.getElementById('m-content').innerHTML=cfg.render();
  const modal=document.getElementById('modal');
  if(key==='localisation'){modal.style.top='2%';modal.style.transform='translate(-50%,0) scale(1)';}
  else{modal.style.top='50%';modal.style.transform='translate(-50%,-50%) scale(1)';}
  document.getElementById('overlay').classList.add('open');
  if(cfg.after)requestAnimationFrame(()=>setTimeout(cfg.after,80));
}
function close_modal(){
  document.getElementById('overlay').classList.remove('open');
  const modal=document.getElementById('modal');
  modal.style.top='50%';modal.style.transform='translate(-50%,-50%) scale(.96)';
  if(active){const el=document.getElementById('hs-'+active);if(el)el.classList.remove('active');active=null;}
}
function handle_overlay(e){if(e.target===document.getElementById('overlay'))close_modal();}

function makeCarousel(id,labels){
  let cur=0;const total=labels.length;
  function goTo(i){
    cur=Math.max(0,Math.min(i,total-1));
    const w=document.getElementById(id+'-slides');
    if(w)w.style.transform='translateX(-'+(cur*100)+'%)';
    document.querySelectorAll('#'+id+'-dots .c-dot').forEach((d,j)=>d.classList.toggle('active',j===cur));
    const lbl=document.getElementById(id+'-lbl');if(lbl)lbl.textContent=labels[cur];
    const prev=document.getElementById(id+'-prev'),next=document.getElementById(id+'-next');
    if(prev)prev.disabled=(cur===0);if(next)next.disabled=(cur===total-1);
  }
  setTimeout(()=>{
    document.getElementById(id+'-prev')?.addEventListener('click',()=>goTo(cur-1));
    document.getElementById(id+'-next')?.addEventListener('click',()=>goTo(cur+1));
    document.querySelectorAll('#'+id+'-dots .c-dot').forEach((d,j)=>d.addEventListener('click',()=>goTo(j)));
    goTo(0);
  },50);
}

function drawLineChart(id,years,series,opts){
  const svg=document.getElementById(id);if(!svg)return;
  const W=520,H=200,pad={l:18,r:18,t:24,b:24};
  const F="'DM Sans',sans-serif";
  const allV=series.flatMap(s=>s.vals);
  if(opts&&opts.dashed)allV.push(...opts.dashed.vals);
  const mx=Math.max(...allV)*1.1;
  const xP=i=>pad.l+(i/(years.length-1))*(W-pad.l-pad.r);
  const yP=v=>pad.t+(H-pad.t-pad.b)*(1-v/mx);
  let h='';
  [.25,.5,.75,1].forEach(f=>{
    const y=yP(mx*f);
    h+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="rgba(78,74,134,.07)" stroke-width="1"/>';
    h+='<text x="'+(pad.l-2)+'" y="'+(y+3)+'" font-size="7.5" fill="#ccc" text-anchor="end" font-family="'+F+'">'+Math.round(mx*f/1000)+'k</text>';
  });
  years.forEach((yr,i)=>{
    h+='<text x="'+xP(i)+'" y="'+(H-4)+'" font-size="9" fill="#aaa" text-anchor="middle" font-family="'+F+'">'+yr+'</text>';
  });
  if(opts&&opts.dashed){
    const d=opts.dashed;
    const pts=d.vals.map((v,i)=>xP(i)+','+yP(v)).join(' ');
    h+='<polyline points="'+pts+'" fill="none" stroke="'+d.c+'" stroke-width="1.6" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round" opacity=".65"/>';
    [0,d.vals.length-1].forEach(i=>{
      const v=d.vals[i];
      h+='<text x="'+(xP(i)+(i===0?7:-7))+'" y="'+(yP(v)-6)+'" font-size="8" fill="'+d.c+'" text-anchor="'+(i===0?'start':'end')+'" font-family="'+F+'" font-weight="500">'+(v/1000).toFixed(0)+'k</text>';
    });
  }
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>xP(i)+','+yP(v)).join(' ');
    h+='<polyline points="'+pts+'" fill="none" stroke="'+s.c+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>';
    s.vals.forEach((v,i)=>{
      h+='<circle cx="'+xP(i)+'" cy="'+yP(v)+'" r="2.8" fill="'+s.c+'"/>';
      if(i===0||i===s.vals.length-1){
        const anc=i===0?'start':'end';const dx=i===0?7:-7;
        h+='<text x="'+(xP(i)+dx)+'" y="'+(yP(v)-6)+'" font-size="8" fill="'+s.c+'" text-anchor="'+anc+'" font-family="'+F+'" font-weight="500">'+(v/1000).toFixed(0)+'k</text>';
      }
    });
  });
  svg.innerHTML=h;
}

    h+='<text x="'+(padL+wH+wM+6)+'" y="'+(y+barH/2+4)+'" font-size="8.5" fill="#888" font-family="'+F+'">'+(d.h+d.m)+' M\u20ac</text>';

    {n:'Algues marines',etp:202,ent:248,f:38.2,c:'#2d9e6b'},
  ];
  const maxEtp=5836,maxR=72,minR=18;
  const pos=[{cx:118,cy:108},{cx:290,cy:115},{cx:415,cy:115}];
  let h='<text x="'+W/2+'" y="13" font-size="8.5" fill="#ddd" text-anchor="middle" font-family="'+F+'" font-style="italic">Taille proportionnelle aux ETP \u2014 Aquaculture marine uniquement</text>';
  data.forEach((d,i)=>{
    const r=minR+(d.etp/maxEtp)*(maxR-minR);
    const {cx,cy}=pos[i];
    h+='<circle cx="'+(cx+2)+'" cy="'+(cy+3)+'" r="'+r+'" fill="rgba(0,0,0,.07)"/>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+d.c+'" opacity=".88"/>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-3)+'" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="1.5"/>';
    const etpTxt=d.etp>999?(d.etp/1000).toFixed(1)+'k':d.etp;
    const fSz=Math.max(10,r/3.2);
    h+='<text x="'+cx+'" y="'+cy+'" font-size="'+fSz+'" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="'+F+'" font-weight="700">'+etpTxt+'</text>';
    h+='<text x="'+cx+'" y="'+(cy+fSz/1.2)+'" font-size="8" fill="rgba(255,255,255,.7)" text-anchor="middle" font-family="'+F+'">ETP</text>';
    h+='<text x="'+cx+'" y="'+(cy+r+14)+'" font-size="9.5" fill="'+d.c+'" text-anchor="middle" font-family="'+F+'" font-weight="600">'+d.n+'</text>';
    h+='<text x="'+cx+'" y="'+(cy+r+26)+'" font-size="8.5" fill="#aaa" text-anchor="middle" font-family="'+F+'">'+d.ent+' entreprises</text>';
    h+='<text x="'+cx+'" y="'+(cy+r+38)+'" font-size="8" fill="#ef7657" text-anchor="middle" font-family="'+F+'">'+d.f+'% de femmes</text>';
  });
  const total=data.reduce((s,d)=>s+d.etp,0);
  h+='<text x="'+W/2+'" y="'+(H-8)+'" font-size="8.5" fill="#bbb" text-anchor="middle" font-family="'+F+'">Total aquaculture marine : '+total.toLocaleString('fr')+' ETP</text>';
  svg.innerHTML=h;
}

function draw_slope(){
  const svg=document.getElementById('slope-svg');if(!svg)return;
  const W=460,H=260,pad={l:120,r:110,t:32,b:16};
  const x0=pad.l,x1=W-pad.r;
  const data=[
    {l:'Hu\xeetres',v23:90410,v24:81383,c:'#7e96cf'},
    {l:'Moules',v23:54531,v24:48775,c:'#4e4a86'},
    {l:'Salmonid\xe9s',v23:29313,v24:33246,c:'#ef7657'},
    {l:'Poissons mar.',v23:5807,v24:6509,c:'#9b94c8'},
    {l:'Algues marines',v23:453,v24:724,c:'#2d9e6b'},
  ];
  const all=data.flatMap(d=>[d.v23,d.v24]);
  const lMn=Math.log(Math.min(...all)),lMx=Math.log(Math.max(...all));
  const scY=v=>pad.t+(H-pad.t-pad.b)*(1-(Math.log(v)-lMn)/(lMx-lMn));
  const F="'DM Sans',sans-serif";
  let h='<line x1="'+x0+'" y1="'+pad.t+'" x2="'+x0+'" y2="'+(H-pad.b)+'" stroke="#eee" stroke-width="1"/>'+
    '<line x1="'+x1+'" y1="'+pad.t+'" x2="'+x1+'" y2="'+(H-pad.b)+'" stroke="#eee" stroke-width="1"/>'+
    '<text x="'+x0+'" y="'+(pad.t-10)+'" font-size="11" fill="#ccc" text-anchor="middle" font-family="'+F+'">2023</text>'+
    '<text x="'+x1+'" y="'+(pad.t-10)+'" font-size="11" fill="#ccc" text-anchor="middle" font-family="'+F+'">2024</text>';
  data.forEach(d=>{
    const y0=scY(d.v23),y1=scY(d.v24);
    const pct=((d.v24-d.v23)/d.v23*100);const sign=pct>=0?'+':'';const pc=pct>=0?'#ef7657':'#7e96cf';
    h+='<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y1+'" stroke="'+d.c+'" stroke-width="2" stroke-linecap="round" opacity=".9"/>'+
      '<circle cx="'+x0+'" cy="'+y0+'" r="3.5" fill="'+d.c+'"/>'+
      '<circle cx="'+x1+'" cy="'+y1+'" r="3.5" fill="'+d.c+'"/>'+
      '<text x="'+(x0-9)+'" y="'+(y0-5)+'" font-size="10" fill="'+d.c+'" text-anchor="end" font-family="'+F+'" font-weight="500">'+d.l+'</text>'+
      '<text x="'+(x0-9)+'" y="'+(y0+8)+'" font-size="9" fill="#ccc" text-anchor="end" font-family="'+F+'">'+(d.v23/1000).toFixed(0)+' kt</text>'+
      '<text x="'+(x1+9)+'" y="'+(y1-5)+'" font-size="11" fill="'+pc+'" text-anchor="start" font-family="'+F+'" font-weight="600">'+sign+pct.toFixed(0)+'%</text>'+
      '<text x="'+(x1+9)+'" y="'+(y1+8)+'" font-size="9" fill="#ccc" text-anchor="start" font-family="'+F+'">'+(d.v24/1000).toFixed(0)+' kt</text>';
  });
  svg.innerHTML=h;
}

function animateCounter(el,target,duration,formatter){
  const start=performance.now();
  function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=formatter(Math.round(ease*target));
    if(p<1)requestAnimationFrame(step);else el.textContent=formatter(target);
  }
  requestAnimationFrame(step);
}

  },400);

});
